name: safe_stream_app
description: A mobile-first moderation tool.
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Camera access
  camera: ^0.11.0
  # Firebase core
  firebase_core: ^3.0.0
  # Authentication and YouTube API access
  google_sign_in: ^6.2.1
  googleapis: ^13.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
