name: Build Mobile Apps
on: [push]
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }

      - name: Setup & Build
        run: |
          mkdir -p assets
          echo '["badword"]' > assets/vision_trigger_list.json
          flutter pub get
          flutter create . --platforms=android
          FILE="android/app/build.gradle.kts"
          [ ! -f "$FILE" ] && FILE="android/app/build.gradle"
          sed -i 's/compileSdk = .*/compileSdk = 36/g' $FILE
          sed -i 's/targetSdk = .*/targetSdk = 36/g' $FILE
          flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with: { name: SafeLive-APK, path: build/app/outputs/flutter-apk/app-release.apk }
